naftiko: 1.0.0-alpha2
info:
  label: TD Online Mart Recurring Payment API — Recurring Payments
  description: 'TD Merchant Solutions Recurring Payment API — schedule and process recurring membership / subscription card payments via the Worldline-backed TD Online Mart gateway.'
  tags:
  - TD Bank
  - Merchant Solutions
  - Payments
  - Recurring Payments
  created: '2026-05-23'
  modified: '2026-05-23'
binds:
- namespace: env
  keys:
    TD_MERCHANT_API_PASSCODE: TD_MERCHANT_API_PASSCODE
    TD_MERCHANT_HASH_KEY: TD_MERCHANT_HASH_KEY
capability:
  consumes:
  - type: http
    namespace: td-online-mart-recurring-payments
    baseUri: https://gateway.tdmerchantservices.com
    description: TD Online Mart Recurring Payment API. Authenticate with API Passcode, Username/Password, or Hash Key.
    resources:
    - name: recurring-payments
      path: /recurring-payments
      operations:
      - name: createrecurringpayment
        method: POST
        description: Schedule Recurring Payment
      - name: listrecurringpayments
        method: GET
        description: List Recurring Payments
    - name: recurring-payments-paymentId
      path: /recurring-payments/{paymentId}
      operations:
      - name: getrecurringpayment
        method: GET
        description: Get Recurring Payment
        inputParameters:
        - name: paymentId
          in: path
          type: string
          required: true
      - name: cancelrecurringpayment
        method: DELETE
        description: Cancel Recurring Payment
        inputParameters:
        - name: paymentId
          in: path
          type: string
          required: true
    authentication:
      type: apiKey
      header: X-API-Passcode
      token: '{{env.TD_MERCHANT_API_PASSCODE}}'
  exposes:
  - type: rest
    namespace: td-online-mart-rest
    port: 8080
    description: REST adapter for TD Online Mart Recurring Payment API.
    resources:
    - path: /v1/recurring-payments
      name: recurringPayments
