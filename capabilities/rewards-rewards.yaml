naftiko: 1.0.0-alpha2
info:
  label: TD Bank Rewards API — Rewards
  description: 'TD Bank Rewards — reward program and membership info for a permissioned user. 2 operations.'
  tags:
  - TD Bank
  - Rewards
  - Open Banking
  created: '2026-05-23'
  modified: '2026-05-23'
binds:
- namespace: env
  keys:
    TD_BANK_API_KEY: TD_BANK_API_KEY
capability:
  consumes:
  - type: http
    namespace: rewards-rewards
    baseUri: https://api.openbanking.amcb.developer.td.com/fdx/v6
    description: TD Rewards API.
    resources:
    - name: rewards-programs
      path: /rewards-programs
      operations:
      - name: listrewardsprograms
        method: GET
        description: List Rewards Programs
    - name: rewards-programs-programId
      path: /rewards-programs/{programId}
      operations:
      - name: getrewardsprogram
        method: GET
        description: Get Rewards Program
        inputParameters:
        - name: programId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.TD_BANK_API_KEY}}'
  exposes:
  - type: rest
    namespace: rewards-rest
    port: 8080
    description: REST adapter for TD Rewards API.
    resources:
    - path: /v1/rewards-programs
      name: rewardsPrograms
