naftiko: 1.0.0-alpha2
info:
  label: TD Open Banking Onboarding (Workflow)
  description: 'Workflow composition: end-to-end onboarding for a fintech data recipient — register app, request PAR, get user consent, exchange token, and pull initial account snapshot (basic + detailed + customer). Composes Apps Management, Token, Consent, Account Basic, Account Detailed, and Customer capabilities.'
  tags:
  - TD Bank
  - Onboarding
  - FDX
  - Open Banking
  - Workflow
  created: '2026-05-23'
  modified: '2026-05-23'
binds:
- namespace: env
  keys:
    TD_BANK_CLIENT_ID: TD_BANK_CLIENT_ID
    TD_BANK_CLIENT_SECRET: TD_BANK_CLIENT_SECRET
capability:
  consumes:
  - type: capability
    ref: capabilities/apps-management-apps.yaml
  - type: capability
    ref: capabilities/token-tokens.yaml
  - type: capability
    ref: capabilities/consent-consents.yaml
  - type: capability
    ref: capabilities/account-basic-accounts.yaml
  - type: capability
    ref: capabilities/account-detailed-accounts.yaml
  - type: capability
    ref: capabilities/customer-customers.yaml
  exposes:
  - type: rest
    namespace: open-banking-onboarding-rest
    port: 8080
    description: REST adapter exposing the composed onboarding workflow.
    resources:
    - path: /v1/onboarding
      name: onboarding
