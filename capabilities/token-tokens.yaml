naftiko: 1.0.0-alpha2
info:
  label: TD Bank Token API — Tokens
  description: 'TD Bank Token — OAuth 2.0 with PAR. Pushed Authorization Request, token exchange, and revocation. 3 operations.'
  tags:
  - TD Bank
  - Token Management
  - OAuth
  - Open Banking
  created: '2026-05-23'
  modified: '2026-05-23'
binds:
- namespace: env
  keys:
    TD_BANK_CLIENT_ID: TD_BANK_CLIENT_ID
    TD_BANK_CLIENT_SECRET: TD_BANK_CLIENT_SECRET
capability:
  consumes:
  - type: http
    namespace: token-tokens
    baseUri: https://api.openbanking.amcb.developer.td.com/oauth/v1
    description: TD Token API.
    resources:
    - name: par
      path: /par
      operations:
      - name: pushedauthorizationrequest
        method: POST
        description: Pushed Authorization Request
    - name: token
      path: /token
      operations:
      - name: createtoken
        method: POST
        description: Create Access Token
    - name: revoke
      path: /revoke
      operations:
      - name: revoketoken
        method: POST
        description: Revoke Token
    authentication:
      type: none
  exposes:
  - type: rest
    namespace: token-rest
    port: 8080
    description: REST adapter for TD Token API.
    resources:
    - path: /v1/tokens
      name: tokens
