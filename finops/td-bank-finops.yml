description: 'FOCUS-aligned FinOps framing for TD Bank developer APIs. The Open Banking API surface
  is partner-contracted via the Akoya Data Access Network — revenue and cost recovery flow through Akoya
  partner agreements and FDX consent economics rather than a per-API price list. TD Merchant Solutions
  (TD Online Mart) revenue flows through interchange and acquirer fees. The single largest non-recurring
  cost on TD''s books in this period is the October 2024 $3B+ Bank Secrecy Act / AML settlement, captured
  in review.yml.'
notes: APIs are not separately priced; meters reflect partner integration billing surface.
sources:
  - https://developer.td.com
  - https://docs.pat.openbanking.amcb.developer.td.com/guides/about-our-apis-hdi
  - https://akoya.com/
  - https://www.td.com/
